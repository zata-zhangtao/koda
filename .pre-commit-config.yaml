# -*- coding: utf-8 -*-
#
# 项目初始化命令
# 1. 添加 pre-commit 作为开发依赖
# 2. 安装 pre-commit 钩子
# 3. 检查当前所有文件（建议首次配置或依赖升级后执行）
#
# 执行顺序建议参考下方说明：


# uv add --dev pre-commit        # 添加 pre-commit 为开发依赖
# uv run pre-commit install      # 初始化 pre-commit 钩子
# uv run pre-commit run --all-files  # 对所有文件执行预提交检测


# 排除生成的文档或特定目录不检查 (可选)
exclude: '^docs/|/migrations/'

repos:
  - repo: local
    hooks:
      # ==========================================
      # 1. 基础文件卫生 (本地执行，避免远程仓库拉取失败)
      # ==========================================
      - id: trailing-whitespace
        name: trailing-whitespace
        entry: uv run --with pre-commit-hooks trailing-whitespace-fixer
        language: system
      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: uv run --with pre-commit-hooks end-of-file-fixer
        language: system
      - id: check-yaml
        name: check-yaml
        entry: uv run --with pre-commit-hooks check-yaml
        language: system
        args: ['--unsafe']
        files: \.(yaml|yml)$
      - id: check-toml
        name: check-toml
        entry: uv run --with pre-commit-hooks check-toml
        language: system
        files: \.toml$
      - id: check-added-large-files
        name: check-added-large-files
        entry: uv run --with pre-commit-hooks check-added-large-files
        language: system
        args: ['--maxkb=50000']
      - id: debug-statements
        name: debug-statements
        entry: uv run --with pre-commit-hooks debug-statement-hook
        language: system
        types: [python]

      # ==========================================
      # 2. Python 代码质量 (Ruff 本地执行)
      # ==========================================
      - id: ruff
        name: ruff
        entry: uv run --with ruff ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: uv run --with ruff ruff format
        language: system
        types: [python]

      # ==========================================
      # 3. 项目文档一致性检查
      # ==========================================
      - id: check-guidelines-consistency
        name: Check guidelines consistency
        entry: uv run python hooks/check_guidelines_consistency.py
        language: system
        files: ^(AGENTS\.md|CLAUDE\.md|\.cursor/commands/cursor\.md)$
        pass_filenames: false
      - id: archive-tasks
        name: Archive task markdown files
        entry: uv run python hooks/archive_tasks.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
