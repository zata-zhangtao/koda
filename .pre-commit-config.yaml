# -*- coding: utf-8 -*-
#
# 项目初始化命令
# 1. 添加 pre-commit 作为开发依赖
# 2. 安装 pre-commit 钩子
# 3. 检查当前所有文件（建议首次配置或依赖升级后执行）
#
# 执行顺序建议参考下方说明：


# uv add --dev pre-commit        # 添加 pre-commit 为开发依赖
# uv run pre-commit install      # 初始化 pre-commit 钩子
# uv run pre-commit run --all-files  # 对所有文件执行预提交检测


# 排除生成的文档或特定目录不检查 (可选)
exclude: '^docs/|/migrations/'

repos:
  # ==========================================
  # 1. 基础文件卫生 (本地自举执行，避免运行时从 GitHub 拉取)
  # ==========================================
  - repo: local
    hooks:
      - id: trailing-whitespace
        name: trailing-whitespace
        entry: uv run python -m pre_commit_hooks.trailing_whitespace_fixer
        language: system
        types: [text]
      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: uv run python -m pre_commit_hooks.end_of_file_fixer
        language: system
        types: [text]
      - id: check-yaml
        name: check-yaml
        entry: uv run python -m pre_commit_hooks.check_yaml --unsafe
        language: system
        files: \.(yaml|yml)$
      - id: check-toml
        name: check-toml
        entry: uv run python -m pre_commit_hooks.check_toml
        language: system
        files: \.toml$
      - id: check-added-large-files
        name: check-added-large-files
        entry: uv run python -m pre_commit_hooks.check_added_large_files --maxkb=50000
        language: system
      - id: debug-statements
        name: debug-statements
        entry: uv run python -m pre_commit_hooks.debug_statement_hook
        language: system
        types: [python]

  # ==========================================
  # 2. Python 代码质量 (本地 Ruff，避免运行时从 GitHub 拉取)
  # ==========================================
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]

  # ==========================================
  # 3. 项目文档一致性检查
  # ==========================================
  - repo: local
    hooks:
      - id: check-guidelines-consistency
        name: Check guidelines consistency
        entry: uv run python hooks/check_guidelines_consistency.py
        language: system
        files: ^(AGENTS\.md|CLAUDE\.md|\.cursor/commands/cursor\.md)$
        pass_filenames: false
      - id: archive-tasks
        name: Archive task markdown files
        entry: uv run python hooks/archive_tasks.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
