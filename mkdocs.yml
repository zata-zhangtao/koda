site_name: Koda 文档
site_description: DevStream Log 与 Codex 自动化实践文档

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            separate_signature: true
            show_root_heading: true
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - 概览: index.md
  - 快速开始: getting-started.md
  - 指南:
      - DSL 开发: guides/dsl-development.md
      - Codex 脚本调用: guides/codex-cli-automation.md
  - 核心:
      - AI 资产: core/ai-assets.md
  - 架构:
      - 系统设计: architecture/system-design.md
      - 技术路线 20260317: architecture/technical-route-20260317.md
      - 数据模型: database/schema.md
  - API:
      - 参考: api/references.md
