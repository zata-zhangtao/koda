site_name: Koda 文档
site_description: 面向 DevStream Log 与多执行器自动化研发工作流的工程文档

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.details
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

nav:
  - 概览: index.md
  - 快速开始: getting-started.md
  - 指南:
      - DSL 开发: guides/dsl-development.md
      - 配置说明: guides/configuration.md
      - 部署说明: guides/deployment.md
      - 公网暴露: guides/public-exposure.md
      - 多执行器自动化: guides/codex-cli-automation.md
  - 原型:
      - 需求工作流示意: prototypes/requirement-workflow-demo.html
      - 独立问答侧通道: prototypes/task-sidecar-qa-demo.html
  - 核心:
      - AI 资产: core/ai-assets.md
      - Prompt 管理: core/prompt-management.md
  - 架构:
      - 系统设计: architecture/system-design.md
      - 技术路线 20260317: architecture/technical-route-20260317.md
  - 数据库:
      - 数据模型: database/schema.md
      - 迁移策略: database/migrations.md
  - 开发:
      - 评测与验证: dev/evaluation.md
      - 发布说明: dev/release-notes.md
  - API:
      - 参考: api/references.md
